<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rough Walk Planner</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    #app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100%;
    }

    #toolbar {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      padding: 0.75rem;
      border-bottom: 1px solid #ddd;
      background: #fff;
      flex-wrap: wrap;
    }

    #map {
      width: 100%;
      height: 100%;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: none;
    }

    input[type="text"] {
      width: 320px;
      max-width: 100%;
      padding: 0.5rem 0.6rem;
      border: 1px solid #bbb;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      padding: 0.5rem 0.8rem;
      border: 1px solid #999;
      border-radius: 6px;
      background: #f7f7f7;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #efefef;
    }

    

    #map.drawing-active {
      cursor: crosshair;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 2000;
    }

    .modal-backdrop.hidden {
      display: none;
    }

    .modal {
      background: #fff;
      width: min(560px, 100%);
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
      padding: 20px;
    }

    .modal h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .modal p {
      margin: 0 0 16px;
      line-height: 1.45;
      color: #222;
    }

    .modal-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .modal-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #333;
    }

    .modal-checkbox input {
      margin: 0;
    }

    .leaflet-control-container .leaflet-top.leaflet-right {
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="helpModal" class="modal-backdrop hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
      <h2 id="helpTitle">How to use this page</h2>
      <p id="helpText"></p>
      <div class="modal-row">
        <label class="modal-checkbox"><input id="dontShowAgain" type="checkbox" /> Don't show again</label>
        <button id="closeHelpBtn">Got it</button>
      </div>
    </div>
  </div>

  <div id="app">
    <div id="toolbar">
      <input id="searchInput" type="text" placeholder="Search place or address" />
      <button id="searchBtn">Search</button>
      <button id="buildBtn">Open in Google Maps</button>
      <button id="clearBtn">Clear route</button>
    </div>
    <div id="map"></div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const map = L.map('map', { boxZoom: false }).setView([59.3293, 18.0686], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const buildBtn = document.getElementById('buildBtn');
    const clearBtn = document.getElementById('clearBtn');
    const helpModal = document.getElementById('helpModal');
    const helpText = document.getElementById('helpText');
    const dontShowAgain = document.getElementById('dontShowAgain');
    const closeHelpBtn = document.getElementById('closeHelpBtn');

    let drawing = false;
    let sampledPoints = [];
    let snappedWaypoints = [];
    let lastSampleTime = 0;
    let previewRequestId = 0;
    let longPressTimer = null;
    let longPressTriggered = false;
    const LONG_PRESS_MS = 450;
    const HELP_MODAL_STORAGE = 'rough-walk-planner-hide-help';

    const rawLine = L.polyline([], {
      color: '#666',
      weight: 5,
      dashArray: '6, 8'
    }).addTo(map);

    const waypointMarkers = L.layerGroup().addTo(map);

    function setStatus() {
    }

    function distanceMeters(a, b) {
      return map.distance(a, b);
    }

    function simplifyPoints(points, minDistanceMeters = 40) {
      if (points.length <= 2) return points.slice();
      const out = [points[0]];
      let last = points[0];
      for (let i = 1; i < points.length - 1; i++) {
        if (distanceMeters(last, points[i]) >= minDistanceMeters) {
          out.push(points[i]);
          last = points[i];
        }
      }
      out.push(points[points.length - 1]);
      return out;
    }

    function reduceWaypoints(points, maxPoints = 12) {
      if (points.length <= maxPoints) return points.slice();
      const result = [];
      for (let i = 0; i < maxPoints; i++) {
        const index = Math.round(i * (points.length - 1) / (maxPoints - 1));
        result.push(points[index]);
      }
      return result;
    }

    function updateWaypointMarkers(points) {
      waypointMarkers.clearLayers();
      points.forEach((p, index) => {
        L.circleMarker(p, {
          radius: index === 0 || index === points.length - 1 ? 6 : 4,
          color: '#0d47a1',
          weight: 2,
          fillColor: '#fff',
          fillOpacity: 1
        }).addTo(waypointMarkers);
      });
    }

    async function searchPlace() {
      const q = searchInput.value.trim();
      if (!q) return;
      try {
        const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q=${encodeURIComponent(q)}`;
        const res = await fetch(url, {
          headers: {
            'Accept': 'application/json'
          }
        });
        const data = await res.json();
        if (!data.length) {
          return;
        }
        const place = data[0];
        const lat = Number(place.lat);
        const lon = Number(place.lon);
        map.setView([lat, lon], 16);
        L.popup()
          .setLatLng([lat, lon])
          .setContent(place.display_name)
          .openOn(map);
      } catch (error) {
        console.error(error);
      }
    }

    async function fetchRoute(points, requestLabel = 'route') {
      const coords = points.map(p => `${p.lng},${p.lat}`).join(';');
      const url = `https://router.project-osrm.org/route/v1/foot/${coords}?overview=full&geometries=geojson&steps=true&continue_straight=false`;
      const res = await fetch(url);
      if (!res.ok) {
        throw new Error(`${requestLabel} request failed`);
      }
      const json = await res.json();
      if (!json.routes || !json.routes.length) {
        throw new Error('No route found');
      }
      return json.routes[0];
    }

    function toLatLngs(geojsonCoordinates) {
      return geojsonCoordinates.map(([lng, lat]) => [lat, lng]);
    }

    async function updatePreviewRoute() {
      if (sampledPoints.length < 2) return;

      const simplified = simplifyPoints(sampledPoints, 35);
      const waypoints = reduceWaypoints(simplified, 10);
      snappedWaypoints = waypoints;

      rawLine.setLatLngs(sampledPoints);
      updateWaypointMarkers(waypoints);
    }

    function clearRoute() {
      drawing = false;
      sampledPoints = [];
      snappedWaypoints = [];
      rawLine.setLatLngs([]);
      waypointMarkers.clearLayers();
      map.getContainer().classList.remove('drawing-active');
    }

    function getTouchLatLng(touchEvent) {
      const touch = touchEvent.touches[0] || touchEvent.changedTouches[0];
      if (!touch) return null;
      const point = map.mouseEventToContainerPoint(touch);
      return map.containerPointToLatLng(point);
    }

    function startDrawingAt(latlng) {
      if (navigator.vibrate) {
        navigator.vibrate(30);
      }
      drawing = true;
      sampledPoints = [latlng];
      snappedWaypoints = [];
      rawLine.setLatLngs(sampledPoints);
      waypointMarkers.clearLayers();
      map.dragging.disable();
      map.doubleClickZoom.disable();
      map.getContainer().classList.add('drawing-active');
    }

    function beginDrawing(e) {
      if (!e.originalEvent.shiftKey) return;
      startDrawingAt(e.latlng);
      L.DomEvent.stop(e.originalEvent);
    }

    function continueDrawing(e) {
      if (!drawing) return;
      const now = performance.now();
      const point = e.latlng;
      const last = sampledPoints[sampledPoints.length - 1];
      if (!last || distanceMeters(last, point) < 10) {
        return;
      }
      sampledPoints.push(point);
      rawLine.setLatLngs(sampledPoints);

      if (now - lastSampleTime > 500 && sampledPoints.length >= 2) {
        lastSampleTime = now;
        updatePreviewRoute();
      }
    }

    function continueDrawingAt(latlng) {
      if (!drawing || !latlng) return;
      const now = performance.now();
      const last = sampledPoints[sampledPoints.length - 1];
      if (!last || distanceMeters(last, latlng) < 10) {
        return;
      }
      sampledPoints.push(latlng);
      rawLine.setLatLngs(sampledPoints);

      if (now - lastSampleTime > 500 && sampledPoints.length >= 2) {
        lastSampleTime = now;
        updatePreviewRoute();
      }
    }

    async function endDrawing() {
      if (!drawing) return;
      drawing = false;
      map.dragging.enable();
      map.doubleClickZoom.enable();
      map.getContainer().classList.remove('drawing-active');

      if (sampledPoints.length < 2) {
        return;
      }

      const simplified = simplifyPoints(sampledPoints, 35);
      const waypoints = reduceWaypoints(simplified, 12);
      snappedWaypoints = waypoints;
      rawLine.setLatLngs(sampledPoints);
      updateWaypointMarkers(waypoints);
    }

    function buildGoogleMapsUrl() {
      if (!snappedWaypoints.length) {
        return '';
      }
      const points = snappedWaypoints;
      const origin = `${points[0].lat},${points[0].lng}`;
      const destination = `${points[points.length - 1].lat},${points[points.length - 1].lng}`;
      const intermediates = points.slice(1, -1).map(p => `${p.lat},${p.lng}`);
      const params = new URLSearchParams({
        api: '1',
        origin,
        destination,
        travelmode: 'walking'
      });
      if (intermediates.length) {
        params.set('waypoints', intermediates.join('|'));
      }
      return `https://www.google.com/maps/dir/?${params.toString()}`;
    }

    function openInGoogleMaps() {
      const url = buildGoogleMapsUrl();
      if (!url) {
        return;
      }
      window.open(url, '_blank', 'noopener');
    }

    map.on('mousedown', beginDrawing);
    map.on('mousemove', continueDrawing);
    map.on('mouseup', endDrawing);
    map.on('mouseout', () => {
      if (drawing) {
        updatePreviewRoute();
      }
    });

    const mapContainer = map.getContainer();

    mapContainer.addEventListener('touchstart', (event) => {
      if (event.touches.length !== 1 || drawing) return;

      longPressTriggered = false;
      clearTimeout(longPressTimer);

      

      longPressTimer = setTimeout(() => {
        const latlng = getTouchLatLng(event);
        if (!latlng) return;

        longPressTriggered = true;
        startDrawingAt(latlng);
      }, LONG_PRESS_MS);
    }, { passive: true });

    mapContainer.addEventListener('touchmove', (event) => {
      if (drawing && longPressTriggered) {
        event.preventDefault();
        continueDrawingAt(getTouchLatLng(event));
        return;
      }

      clearTimeout(longPressTimer);
      
    }, { passive: false });

    mapContainer.addEventListener('touchend', (event) => {
      clearTimeout(longPressTimer);

      

      if (drawing && longPressTriggered) {
        event.preventDefault();
        endDrawing();
      }

      longPressTriggered = false;
    }, { passive: false });

    mapContainer.addEventListener('touchcancel', () => {
      clearTimeout(longPressTimer);

      

      if (drawing) {
        endDrawing();
      }

      longPressTriggered = false;
    });

    searchBtn.addEventListener('click', searchPlace);
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        searchPlace();
      }
    });
    buildBtn.addEventListener('click', openInGoogleMaps);
    clearBtn.addEventListener('click', clearRoute);

    function showHelpModal() {
      const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      helpText.textContent = isTouchDevice
        ? 'This page allows you to draw a rough walking path on a map and then you can open that in Google Maps with detailed walking directions, approximately following your rough path. Long-press the map to begin drawing your path and draw it with your finger pressed. Click Open in Google Maps to get the detailed instructions.'
        : 'This page allows you to draw a rough walking path on a map and then you can open that in Google Maps with detailed walking directions, approximately following your rough path. Hold SHIFT and click the map to begin drawing your path and draw it with the button pressed. Click Open in Google Maps to get the detailed instructions.';
      helpModal.classList.remove('hidden');
    }

    closeHelpBtn.addEventListener('click', () => {
      if (dontShowAgain.checked) {
        localStorage.setItem(HELP_MODAL_STORAGE, 'true');
      } else {
        localStorage.removeItem(HELP_MODAL_STORAGE);
      }
      helpModal.classList.add('hidden');
    });

    if (localStorage.getItem(HELP_MODAL_STORAGE) !== 'true') {
      showHelpModal();
    }

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const { latitude, longitude } = position.coords;
          map.setView([latitude, longitude], 15);
        },
        () => {},
        {
          enableHighAccuracy: false,
          timeout: 8000,
          maximumAge: 300000
        }
      );
    }
  </script>
</body>
</html>
